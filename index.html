<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Romantic Question</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',serif;
    background: radial-gradient(circle at center,#5a0f1c,#1a0006);
    color:#fff;
    overflow:hidden;
}

/* romantic glow */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at 20% 30%, rgba(255,200,150,.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,180,100,.12), transparent 40%);
    pointer-events:none;
}

/* container card */
.container{
    text-align:center;
    background:rgba(30,0,10,.6);
    padding:60px;
    border-radius:20px;
    border:1px solid rgba(255,215,170,.3);
    box-shadow:0 0 40px rgba(255,0,80,.25);
    backdrop-filter: blur(6px);

    position: relative;   /* important */
}

#no{
    position:absolute;
}

/* title */
h1{
    font-family:'Great Vibes',cursive;
    font-size:56px;
    color:#ffd7a8;
    margin-bottom:30px;
}

.subtitle{
    font-size:22px;
    margin-bottom:40px;
    color:#f5c6d6;
}

/* buttons */

button{
    font-size:20px;
    padding:14px 35px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    margin:10px;
    transition:all .25s ease;
}

#yes{
    background:linear-gradient(45deg,#d4145a,#fbb03b);
    color:white;
    box-shadow:0 0 15px rgba(255,60,100,.6);
}

#yes:hover{
    transform:scale(1.1);
}

#no{
    position:absolute;
    background:#5a0f1c;
    color:#ffd7a8;
    border:1px solid #ffd7a8;
}

/* date page */

#datePage{
    display:none;
}

.date-title{
    font-family:'Great Vibes',cursive;
    font-size:60px;
    color:#ffd7a8;
}

.details{
    font-size:22px;
    margin-top:20px;
    color:#f8d7da;
}

.rose{
    font-size:40px;
    margin-top:20px;
}

</style>
</head>

<body>

<div id="questionPage" class="container">
    <h1>My Beautiful Question</h1>
    <div class="subtitle">Would you honor me with a romantic date? 🌹</div>

    <button id="yes">Yes ❤️</button>
    <button id="no">No</button>
</div>


<div id="datePage" class="container">
    <div class="date-title">It's a Date ❤️</div>

    <div class="details">
        📍 Location: Tomoca Coffee, Bole<br><br>
        🕯 Time: Saturday — 4:00 PM<br><br>
        Dress Code: Elegant & Beautiful
    </div>

    <div class="rose">🌹🌹🌹</div>
</div>



<script>
const yesBtn = document.getElementById("yes");

yesBtn.onclick = () =>{
    document.getElementById("questionPage").style.display="none";
    document.getElementById("datePage").style.display="block";
}

const noBtn = document.getElementById("no");
const container = document.getElementById("questionPage");

document.addEventListener("mousemove", function(e){

    const rect = noBtn.getBoundingClientRect();

    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(distance < 100){

        const containerRect = container.getBoundingClientRect();

        const maxX = containerRect.width - noBtn.offsetWidth;
        const maxY = containerRect.height - noBtn.offsetHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

});

</script>

</body>
</html>
