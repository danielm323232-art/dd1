<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>A Romantic Question</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Playfair Display',serif;
    background: radial-gradient(circle at center,#5a0f1c,#1a0006);
    color:#fff;
    overflow:hidden;
}

.container{
    text-align:center;
    background:rgba(30,0,10,.6);
    padding:60px;
    border-radius:20px;
    border:1px solid rgba(255,215,170,.3);
    box-shadow:0 0 40px rgba(255,0,80,.25);
    backdrop-filter: blur(6px);
    position:relative;
    width: 600px;
}

#no{
    position:absolute;
}

h1{
    font-family:'Great Vibes',cursive;
    font-size:56px;
    color:#ffd7a8;
}

.subtitle{
    font-size:22px;
    margin-bottom:30px;
    color:#f5c6d6;
}

button{
    font-size:20px;
    padding:14px 35px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    margin:10px;
    position:relative;
}

#yes{
    background:linear-gradient(45deg,#d4145a,#fbb03b);
    color:white;
}

#no{
    background:#5a0f1c;
    color:#ffd7a8;
    border:1px solid #ffd7a8;
}

#funnyText{
    margin-top:25px;
    font-size:20px;
    color:#ffd7a8;
    min-height:30px;
}

#noImg{
    margin-top:20px;
    width:220px;
    display:none;
    transition:transform .4s;
}

.location-link{
    color:#ffd7a8;
    text-decoration:none;
    font-size:22px;
    font-weight:500;
    transition:all .25s ease;
}

.location-link:hover{
    color:#ffffff;
    text-shadow:0 0 10px rgba(255,200,150,.8);
}

#datePage{
    display:none;
}

</style>
</head>

<body>

<div id="questionPage" class="container">

    <h1>Oh, It's You</h1>
    <div class="subtitle">Since you're already here… wanna go on a date? 🌹</div>
    <button id="yes">Yes ❤️</button>
    <button id="no">No</button>

    <div id="funnyText"></div>
    <img id="noImg" src="st,small,507x507-pad,600x600,f8f8f8.png">

</div>

<div id="datePage" class="container">

<h1>It's a Date </h1>
<img src="yesbaby.png" width="250">

<div style="margin-top:20px;font-size:22px;">
    <a href="https://share.google/W4in5ymwN9C2rbo5h" target="_blank" class="location-link">
        📍 Location: Delmela Café and Restaurant
    </a>
    <br><br>🕯 Time: Saturday — 8:00 LT <br><br>
Dress Code: Elegant & Beautiful
</div>

</div>

<script>
const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const funnyText = document.getElementById("funnyText");
const noImg = document.getElementById("noImg");
const questionPage = document.getElementById("questionPage");
const container = document.querySelector(".container");

let count = 0;
let imgIndex = 0;

/* rejection images */
const images = [
    "st,small,507x507-pad,600x600,f8f8f8.png",
    "st,small,507x507-pad,600x600,f8f8f8 (1).png"
];

/* funny messages */
const funnyMessages = [
    "Are you sure about that? 😭",
    "Interesting choice… Muncho is taking notes. 🐶🔪",
    "You didn't even think about it...",
    "This is getting awkward...",
    "Muncho behind me just whispered 'press yes'.",
    "You still have time to change your answer…",
    "Every no makes Muncho grip the knife tighter.",
    "Muncho is starting to take this personally.",
    "Muncho didn’t like that answer.",
    "Final warning… reconsider."
];

/* YES button */
yesBtn.onclick = () => {
    questionPage.style.display = "none";
    document.getElementById("datePage").style.display = "block";

    emailjs.send('service_v036j1p', 'template_sgfie05', {
        to_email: 'mussiebeter@gmail.com',
        from_name: 'Your Mussie',
        message: 'The user has confirmed the date! ❤️'
    })
    .then(function(response) {
       alert("Confirmation email sent!");
    }, function(error) {
       alert("Failed to send confirmation email.");
    });
};
/* NO button logic */
noBtn.onclick = () => {
    count++;

    if (count > 3) {
        questionPage.innerHTML = "<h1>Nahh your lose/h1>";
        noBtn.disabled = true;
        return;
    }

    noImg.style.display = "block";
    funnyText.innerText = funnyMessages[count % funnyMessages.length];
    imgIndex = (imgIndex + 1) % images.length;
    noImg.src = images[imgIndex];

    const corners = [
        {top: "10px", left: "10px"},
        {top: "10px", right: "10px"},
        {bottom: "10px", left: "10px"},
        {bottom: "10px", right: "10px"}
    ];
    const corner = corners[Math.floor(Math.random() * corners.length)];

    noImg.style.top = "";
    noImg.style.left = "";
    noImg.style.right = "";
    noImg.style.bottom = "";

    for (const prop in corner) {
        noImg.style[prop] = corner[prop];
    }

    noImg.style.transform = `rotate(0deg)`;
}

/* Make NO button run from cursor */
document.addEventListener("mousemove", function(e){
    const rect = noBtn.getBoundingClientRect();
    const distance = Math.hypot(
        e.clientX - (rect.left + rect.width/2),
        e.clientY - (rect.top + rect.height/2)
    );

    if(distance < 120){ // threshold for fleeing
        const containerRect = questionPage.getBoundingClientRect();
        const maxX = containerRect.width - noBtn.offsetWidth;
        const maxY = containerRect.height - noBtn.offsetHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }
});
</script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<script type="text/javascript">
   emailjs.init("9QB9XgODkOz2PSsuG"); // replace with your EmailJS public key
</script>
</body>
</html>
